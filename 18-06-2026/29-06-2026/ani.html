<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .A{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
    }
    .a1 {
        border: 1px solid black;
        height: 200px;
        width: 200px;
        background-color: orangered;

    }

    .a1:hover {
        background-color: rgb(73, 9, 223);
        transition-duration: 5s;
        transition-delay: 2s;
        transition-timing-function: linear;
    }

    .a2 {
        border: 1px solid black;
        height: 200px;
        width: 200px;
        background-color: rgb(47, 197, 17);

    }

    .a2:hover {
        background-color: rgb(13, 168, 196);
        transition-duration: 3s;
        /* transition-delay: 2s;  */
        transition-timing-function: ease-in-out;
    }

    .a3 {
        border: 1px solid;
        height: 200px;
        width: 200px;
        background-color: rgb(10, 224, 171);

    }
     .a3:hover {
        background-color: rgb(234, 248, 34);
        transition-duration: 3s;
        transition-delay: 2s;
        transition-timing-function: ease-in;
    }
     .a4 {
        border: 1px solid;
        height: 200px;
        width: 200px;
        background-color: rgb(224, 10, 10);
     }
     .a4:hover{
        background-color: blanchedalmond;
        transition: 2s ease-in-out 1s;
     }
    
     
</style>

<body>
    <div class="A">
        <div class="a1">
            linear
        </div>
        <div class="a2">
            ease-in-out
        </div>
        <div class="a3">
            ease-in
        </div>
        <div class="a4">

        </div>
    </div>

</body>

</html>
