<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: white;

        }

        .head {
            width: 800px;
            height: 350px;
            display: flex;
            margin-left: 200px;
            margin-top: 100px;
            /* border: 2px solid black; */
        }

        .Left {
            width: 500px;
            background: beige;
            padding: 100px;
            border-radius: 10px;
        }

        input:hover {
            border: 2px solid skyblue;
            outline: none;
        }

        h2 {
            margin-left: 30px;
        }

        .Left p {
            margin-left: 8px;
        }

        .right {
            width: 500px;
            background: rgb(123, 213, 248);
            border-radius: 10px;
            padding: 100px;
        }

        button {
            margin-top: 3px;
            padding: 2px 30px;
            border-radius: 20px;
            margin-left: 25px;
            background: skyblue;
        }

        .up {
            background: white;
        }

        a {
            margin-left: 30px;
        }
    </style>
</head>

<body>
    <div class="head">
        <div class="Left">
            <h2>Sign In</h2>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-google"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a><br><br>
            <input type="email" placeholder="User Email"><br><br>
            <input type="password" placeholder="Password">
            <p>Forgot Your Password ?</p>
            <button>Sign In</button>
        </div>
        <div class="right">
            <h2>Sign Up</h2>
            <p>Sign up here if you have account</p>
            <button class="up">Sign Up</button>
        </div>
    </div>
</body>

</html>
