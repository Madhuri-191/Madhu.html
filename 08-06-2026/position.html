<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:100px;
    height:100px;
    color:white;
    text-align:center;
    line-height:100px;
    margin:20px;
}

.static{
    position:static;
    background:red;
}

.relative{
    position:relative;
    left:30px;
    background:blue;
}

.parent{
    position:relative;
    width:200px;
    height:150px;
    border:2px solid black;
}

.absolute{
    position:absolute;
    top:20px;
    right:20px;
    width:100px;
    height:100px;
    background:green;
    color:white;
    text-align:center;
    line-height:100px;
}

.fixed{
    position:fixed;
    bottom:10px;
    right:10px;
    width:100px;
    height:100px;
    background:orange;
    color:white;
    text-align:center;
    line-height:100px;
}
</style>
</head>
<body>

<div class="box static">Static</div>

<div class="box relative">Relative</div>

<div class="Parent">
    <div class="absolute">Absolute</div>
</div>

<div class="fixed">Fixed</div>

</body>
</html>
