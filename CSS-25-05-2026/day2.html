<!DOCTYPE html>
<html>
<head>
<title>Place an Order</title>

<style>
body{
    background-color:#f2f5f5;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
}

.main{
    width:700px;
    margin:auto;
    background:linear-gradient(to bottom,#807272,#f2f5f5);
    padding:20px;
    border:10px solid white;
}

h1{
    text-align:center;
    font-size:60px;
    font-style:italic;
    color:#4d4d4d;
}

.form-box{
    background:white;
    width:500px;
    margin:auto;
    padding:30px;
    border-radius:10px;
}

h2{
    font-size:60px;
    font-style: oblique;
    color:#111111;
}

form{
    width:100%;
}

label{
    padding-left:100px;
    font-size:20px;
    color:#1a1919;
} 
.right{
    padding-left:200px;
}
 input,select{
    width:200px;
    height:30px;
} 
</style>

</head>

<body>

<div class="main">

<h1>Place an Order</h1>

<div class="form-box">

<h2>Billing Address</h2>

<label for="First name">
   <b>First Name:</b>
<input type="text"></label><br><br>

<label for="Last name">
   <b>Last Name:</b>
<input type="text"></label><br><br>

<label for="Street Address">
   <b>Street Address:</b>
<input type="text"></label><br><br>

<label class="right" for="City">
   <b>City:</b>
<input type="text"></label><br><br>

<label class="right" for="State">
   <b>State:</b>
</label>
<select>
<option>AL</option>
<option>AP</option>
<option>CA</option>
<option>FL</option>
<option>TX</option>
</select>
</div>

</body>
</html>
