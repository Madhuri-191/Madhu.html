<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap');

h1{
    font-size: 40px;
    font-family: Arial, sans-serif;
}

.p1{
    font-family: Arial, sans-serif;
    font-weight: bold;
}

.p2{
    display: inline; 
    font-family: 'Dancing Script', cursive;
    font-style: italic;
    font-size: 30px;
    font-variant: small-caps;
    color: aqua;
}
</style>
</head>
<body>

<h1>My Favorite Fonts</h1>

<p class="p1">
This is a paragraph written in Arial font and appears bold.
</p>

<p class="p2">
This is a paragraph written in Dancing Script font and appears italic.
</p>

</body>
</html>
